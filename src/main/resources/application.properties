# 1. Database Connection (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/iotsensordashboard
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate/JPA Settings (Auto-creates tables from your Entities)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. JWT Security Configuration
# This must be a Base64 encoded string of at least 32 characters
jwt.secret=Zm9yZXZlci1zdHJvbmctYmFzZTY0LWtleS1leGFtcGxlLTIwMjY=

# 4. Server Port (Optional, defaults to 8080)
server.port=8080