<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Dashboard - Overview</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dashboard-body">

<div class="dashboard-wrapper">
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-microchip"></i>
            <span>IoT Dashboard</span>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="active"><i class="fas fa-th-large"></i> Overview</a>
            <a href="#"><i class="fas fa-thermometer-half"></i> Sensors</a>
            <a href="#"><i class="fas fa-cog"></i> Settings</a>
        </nav>
        <button id="logoutBtn" class="logout-link">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </aside>

    <main class="main-content">
        <header class="content-header">
            <h2>Welcome back, <span id="userDisplay">User</span>!</h2>
        </header>

        <section class="stats-overview">
            <div class="device-grid" id="deviceList">
                <div class="loading-state">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    <p>Fetching your sensor data...</p>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="dashboard.js"></script>
</body>
</html>
